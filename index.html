<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- avisa o navegador que o app so tem tema escuro: evita areas brancas
       (overscroll, barra de endereco, controles nativos) em navegadores
       como o Safari, que por padrao assumem tema claro -->
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#020617">

  <title>Music Player</title>

  <!-- favicons -->
  <link rel="icon" href="assets/icons/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="assets/icons/site.webmanifest">

  <!-- tailwind (via cdn, sem build/instalacao) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- alpine.js (via cdn) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>

  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="h-screen w-screen overflow-hidden text-slate-100 antialiased bg-[radial-gradient(ellipse_at_top,_#1e1b4b,_#020617_65%)]">

  <div x-data="musicPlayer()" x-init="init()" class="flex h-full w-full flex-col lg:flex-row">

    <!-- sidebar: lista de musicas -->
    <!-- desktop (lg+): coluna fixa sempre visivel, ao lado do player -->
    <!-- mobile/tablet: painel em tela cheia, aberto/fechado pelo botao de fila -->
    <aside
      class="w-full shrink-0 flex-col border-white/10 bg-slate-950/95 p-4 backdrop-blur lg:flex lg:w-80 lg:border-r lg:bg-slate-950/50 lg:p-6 xl:w-96"
      :class="showList ? 'fixed inset-0 z-30 flex' : 'hidden'"
    >
      <div class="mb-4 flex shrink-0 items-center justify-between">
        <div class="flex items-center gap-2 text-slate-200">
          <span class="material-icons text-indigo-400">queue_music</span>
          <span class="font-medium">Lista de músicas</span>
        </div>

        <button @click="showList = false" class="text-slate-400 transition hover:text-indigo-400 lg:hidden">
          <span class="material-icons">close</span>
        </button>
      </div>

      <ul class="no-scrollbar min-h-0 flex-1 space-y-1 overflow-y-auto pr-1">
        <template x-for="(song, i) in songs" :key="i">
          <li
            @click="selectSong(i); showList = false"
            class="flex cursor-pointer items-center justify-between gap-3 rounded-xl px-3 py-2 transition"
            :class="i === index ? 'bg-indigo-500/10 text-indigo-400 pointer-events-none' : 'text-slate-300 hover:bg-white/5'"
          >
            <div class="min-w-0">
              <p class="truncate text-sm" :class="i === index && 'font-semibold'" x-text="song.name"></p>
              <p class="truncate text-xs text-slate-500" x-text="song.artist"></p>
            </div>

            <span class="shrink-0 text-xs text-slate-500" x-text="i === index ? 'Tocando' : (durations[i] || '--:--')"></span>
          </li>
        </template>
      </ul>
    </aside>

    <!-- player principal -->
    <main class="relative flex min-h-0 flex-1 flex-col items-center justify-center gap-5 overflow-hidden p-6 lg:gap-6 lg:p-12">

      <!-- info -->
      <button @click="showInfo = !showInfo" class="absolute right-5 top-5 text-slate-400 transition hover:text-indigo-400" title="Sobre">
        <span class="material-icons text-xl">info</span>
      </button>

      <div
        x-show="showInfo"
        x-transition
        x-cloak
        class="absolute right-5 top-14 w-64 max-w-[80vw] rounded-xl bg-white/5 p-3 text-xs text-slate-400 backdrop-blur"
      >
        Feito com <span class="text-indigo-400">&#9829;</span> para ouvir suas músicas favoritas.
      </div>

      <span class="shrink-0 text-xs font-medium uppercase tracking-widest text-indigo-400">Tocando agora</span>

      <!-- capa da musica -->
      <div class="aspect-square w-[min(70vw,42vh,26rem)] shrink-0 overflow-hidden rounded-3xl bg-slate-800 ring-1 ring-white/10 shadow-2xl shadow-black/50">
        <img :src="imgSrc" @error="onImgError($event)" alt="Capa da música" class="h-full w-full object-cover">
      </div>

      <!-- nome / artista -->
      <div class="w-full max-w-md shrink-0 px-4 text-center">
        <p class="truncate text-xl font-semibold lg:text-2xl" x-text="current.name"></p>
        <p class="mt-1 truncate text-sm text-slate-400 lg:text-base" x-text="current.artist"></p>
      </div>

      <!-- audio real (invisivel) -->
      <audio
        x-ref="audio"
        @timeupdate="currentTime = $refs.audio.currentTime"
        @loadedmetadata="duration = $refs.audio.duration"
        @play="playing = true"
        @pause="playing = false"
        @ended="onEnded()"
        class="hidden"
      ></audio>

      <!-- barra de progresso -->
      <div class="w-full max-w-md shrink-0">
        <div @click="seek($event)" class="group relative h-1.5 cursor-pointer rounded-full bg-white/10">
          <div class="h-full rounded-full bg-indigo-500" :style="`width:${progressPercent}%`"></div>
          <div
            class="absolute top-1/2 h-3 w-3 -translate-y-1/2 scale-0 rounded-full bg-white shadow transition group-hover:scale-100"
            :style="`left:calc(${progressPercent}% - 6px)`"
          ></div>
        </div>

        <div class="mt-2 flex justify-between text-xs text-slate-400">
          <span x-text="formatTime(currentTime)"></span>
          <span x-text="formatTime(duration)"></span>
        </div>
      </div>

      <!-- controles -->
      <div class="flex w-full max-w-md shrink-0 items-center justify-between px-1">
        <button @click="cycleRepeat()" :title="repeatTitle" class="text-slate-400 transition hover:text-indigo-400">
          <span class="material-icons text-2xl" x-text="repeatMode"></span>
        </button>

        <button @click="prev()" class="text-slate-200 transition hover:text-indigo-400">
          <span class="material-icons text-4xl">skip_previous</span>
        </button>

        <button
          @click="togglePlay()"
          class="flex h-14 w-14 items-center justify-center rounded-full bg-indigo-500 text-white shadow-lg shadow-indigo-500/40 transition hover:bg-indigo-400 active:scale-95"
        >
          <span class="material-icons text-3xl" x-text="playing ? 'pause' : 'play_arrow'"></span>
        </button>

        <button @click="next()" class="text-slate-200 transition hover:text-indigo-400">
          <span class="material-icons text-4xl">skip_next</span>
        </button>

        <button @click="showList = !showList" class="text-slate-400 transition hover:text-indigo-400 lg:invisible lg:pointer-events-none">
          <span class="material-icons text-2xl">queue_music</span>
        </button>
      </div>

    </main>

  </div>

  <script src="assets/js/songs.js"></script>
  <script src="assets/js/player.js"></script>

</body>
</html>
